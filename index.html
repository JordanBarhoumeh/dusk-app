<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dusk</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #060a12;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .mark {
      font-size: 56px;
      line-height: 1;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 12px;
    }

    p.tagline {
      color: rgba(255,255,255,0.5);
      font-size: 17px;
      line-height: 1.6;
      max-width: 360px;
      text-align: center;
      margin-bottom: 48px;
    }

    .links {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    a.btn {
      display: inline-block;
      padding: 12px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    a.btn:hover { opacity: 0.8; }

    a.btn-primary {
      background: #2DD4BF;
      color: #060a12;
    }

    a.btn-ghost {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.12);
    }

    footer {
      margin-top: 72px;
      color: rgba(255,255,255,0.2);
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="mark">✦</div>
  <h1>Dusk</h1>
  <p class="tagline">Your daily summary. Sleep, movement, and the shape of your day — all in one place.</p>

  <div class="links">
    <a class="btn btn-ghost" href="privacy.html">Privacy Policy</a>
    <a class="btn btn-ghost" href="support.html">Support</a>
  </div>

  <footer>&copy; 2026 Dusk. All rights reserved.</footer>
</body>
</html>
